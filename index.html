<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Deck Nexus is a local-first Commander deck builder with no commerce data or required login."
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="%BASE_URL%assets/deck-nexus-mark.svg"
    />
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var redirectPath = params.get("p");
        if (redirectPath) {
          window.history.replaceState(null, "", redirectPath);
        }
      })();
    </script>
    <script>
      (function () {
        var isPagesSourceFallback =
          window.location.hostname === "haroldh1995.github.io" &&
          window.location.pathname.indexOf("/Deck-Nexus") === 0;
        if (!isPagesSourceFallback) {
          return;
        }

        window.setTimeout(function () {
          var root = document.getElementById("root");
          if (
            !root ||
            root.childElementCount > 0 ||
            window.__DECK_NEXUS_BOOTSTRAPPED__ ||
            document.querySelector('script[src*="/assets/index-"]')
          ) {
            return;
          }

          var base = "/Deck-Nexus/";
          var stylesheet = document.createElement("link");
          stylesheet.rel = "stylesheet";
          stylesheet.crossOrigin = "anonymous";
          stylesheet.href = base + "assets/index-CU0hpLYw.css";
          document.head.appendChild(stylesheet);

          var script = document.createElement("script");
          script.type = "module";
          script.crossOrigin = "anonymous";
          script.src = base + "assets/index-Dzn8G_WT.js";
          document.body.appendChild(script);
        }, 200);
      })();
    </script>
    <title>Deck Nexus</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
