<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Deck Nexus is a local-first Commander deck builder with no commerce data or required login."
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="%BASE_URL%assets/deck-nexus-mark.svg"
    />
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var redirectPath = params.get("p");
        if (redirectPath) {
          window.history.replaceState(null, "", redirectPath);
        }
      })();
    </script>
    <title>Deck Nexus</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function () {
        if (!window.location.hostname.endsWith("github.io")) {
          return;
        }

        window.setTimeout(function () {
          if (window.__DECK_NEXUS_BOOTSTRAPPED__) {
            return;
          }

          var githubPagesBase = "/Deck-Nexus/";
          var fallbackCss = githubPagesBase + "assets/deck-nexus-app.css";
          var fallbackJs = githubPagesBase + "assets/deck-nexus-app.js";

          if (!document.querySelector('link[href="' + fallbackCss + '"]')) {
            var stylesheet = document.createElement("link");
            stylesheet.rel = "stylesheet";
            stylesheet.href = fallbackCss;
            document.head.appendChild(stylesheet);
          }

          import(fallbackJs).catch(function (error) {
            console.error("Deck Nexus GitHub Pages fallback failed.", error);
          });
        }, 350);
      })();
    </script>
  </body>
</html>
