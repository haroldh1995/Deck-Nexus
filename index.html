<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Deck Nexus is a local-first Commander deck builder with no commerce data or required login."
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="%BASE_URL%assets/deck-nexus-mark.svg"
    />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var redirectPath = params.get("p");
        if (redirectPath) {
          window.history.replaceState(null, "", redirectPath);
        }
      })();
    </script>
    <title>Deck Nexus</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
